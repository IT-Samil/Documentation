<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri PRO</title>

<style>
/* ===== BODY CYBERPUNK ===== */
body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: radial-gradient(circle at top, #1a0033, #000);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* ===== HEADER ===== */
header h1{
    font-size:40px;
    background: linear-gradient(90deg,#ff00cc,#00ffff);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 20px rgba(255,0,200,0.7);
}

/* ===== GRID 3D ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
    perspective:1000px;
}

/* ===== CARD ===== */
.photo{
    position:relative;
    border-radius:15px;
    overflow:hidden;
    transform-style:preserve-3d;
    transition: transform 0.2s ease;
}

/* NEON BORDER */
.photo::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:15px;
    background:linear-gradient(45deg,#ff00cc,#00ffff,#ff00cc);
    filter:blur(12px);
    opacity:0;
    transition:0.3s;
}

.photo:hover::before{
    opacity:1;
}

/* IMAGE */
.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

/* HOVER ZOOM */
.photo:hover img{
    transform:scale(1.1);
}

/* ===== GLITCH EFFECT ===== */
.photo:hover img{
    animation: glitch 0.2s steps(2,end);
    filter: contrast(1.2) brightness(1.2);
}

@keyframes glitch{
    0%{ transform:translate(0,0); }
    25%{ transform:translate(-2px,2px); }
    50%{ transform:translate(2px,-2px); }
    75%{ transform:translate(-2px,-1px); }
    100%{ transform:translate(0,0); }
}

/* ===== MODAL ===== */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.4s;
}

.modal.show{
    opacity:1;
    visibility:visible;
}

/* MODAL IMAGE */
.modal img{
    max-width:85%;
    max-height:85%;
    border-radius:10px;
    box-shadow:
        0 0 20px #ff00cc,
        0 0 40px #00ffff;
    transform:scale(0.8);
    transition:0.4s;
}

.modal.show img{
    transform:scale(1);
}

/* NAV */
.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    color:#00ffff;
    cursor:pointer;
    text-shadow:0 0 10px #00ffff;
}

#prev{ left:20px; }
#next{ right:20px; }

/* CLOSE */
#close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    color:#ff00cc;
    cursor:pointer;
}

/* ===== SCANLINE ===== */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

/* ===== CANVAS BACKGROUND ===== */
#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

/* ===== GLASS EFFECT ===== */
.modal{
    backdrop-filter: blur(20px) saturate(150%);
}

/* ===== RGB GLITCH ===== */
.glitch{
    position:relative;
}



.glitch::before{
    transform:translate(2px,0);
    filter:brightness(1.5) contrast(1.2);
    mix-blend-mode:screen;
    color:red;
}

.glitch::after{
    transform:translate(-2px,0);
    filter:brightness(1.5);
    mix-blend-mode:screen;
    color:cyan;
}

/* ===== NEON CURSOR DOT ===== */
.cursor{
    position:fixed;
    width:10px;
    height:10px;
    background:#00ffff;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 10px #00ffff,0 0 20px #00ffff;
}
</style>

</head>

<body>
<canvas id="particles"></canvas>
<header>
<h1>Galeri SAMIL TEXTILE INDONESIA</h1>
<p>DOKUMENTASI KEGIATAN SAMIL</p>
</header>

<section class="gallery" id="gallery"></section>

<!-- MODAL -->
<div class="modal" id="modal">
    <span id="close">&times;</span>
    <span class="nav" id="prev">&#10094;</span>
    <img id="modal-img">
    <span class="nav" id="next">&#10095;</span>
</div>

<script>
// ================= INIT =================
const gallery = document.getElementById("gallery")
const modal = document.getElementById("modal")
const modalImg = document.getElementById("modal-img")
const close = document.getElementById("close")
const next = document.getElementById("next")
const prev = document.getElementById("prev")

let currentIndex = 0

// ================= DATA =================
const imagesData = [
    "1LB.jpeg",
	"2LB.jpeg",
	"3.jpg",
    "https://github.com/IT-Samil/Documentation/blob/main/1LB.jpeg?raw=true",
    "5.jpg",
	"6.jpg"
]

// ================= RENDER =================
imagesData.forEach((src,index)=>{

    const card = document.createElement("div")
    card.className = "photo"

    const img = document.createElement("img")
    img.src = src
    img.loading = "lazy"

    card.appendChild(img)
    gallery.appendChild(card)

    // CLICK (SINGLE SOURCE)
    img.onclick = ()=>{
        currentIndex = index
        modalImg.src = src

        modal.classList.add("show")
        modalImg.style.transform = "scale(0.6)"

        setTimeout(()=>{
            modalImg.style.transform = "scale(1)"
        },50)
    }

    // 3D PARALLAX
    card.addEventListener("mousemove",(e)=>{
        const rect = card.getBoundingClientRect()

        const x = e.clientX - rect.left
        const y = e.clientY - rect.top

        const rotateX = -(y - rect.height/2) / 10
        const rotateY = (x - rect.width/2) / 10

        card.style.transform = `
            rotateX(${rotateX}deg)
            rotateY(${rotateY}deg)
            scale(1.05)
        `
    })

    card.addEventListener("mouseleave",()=>{
        card.style.transform = "rotateX(0) rotateY(0) scale(1)"
    })
})

// ================= MODAL CONTROL =================
function showImage(){
    modalImg.src = imagesData[currentIndex]
}

next.onclick = (e)=>{
    e.stopPropagation()
    currentIndex = (currentIndex + 1) % imagesData.length
    showImage()
}

prev.onclick = (e)=>{
    e.stopPropagation()
    currentIndex = (currentIndex - 1 + imagesData.length) % imagesData.length
    showImage()
}

close.onclick = ()=> modal.classList.remove("show")
modal.onclick = ()=> modal.classList.remove("show")
modalImg.onclick = (e)=> e.stopPropagation()

// KEYBOARD
document.addEventListener("keydown",(e)=>{
    if(!modal.classList.contains("show")) return

    if(e.key==="Escape") modal.classList.remove("show")
    if(e.key==="ArrowRight") next.click()
    if(e.key==="ArrowLeft") prev.click()
})

// ================= PARTICLE =================
const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

function resize(){
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
}
resize()
window.addEventListener("resize", resize)

let particles=[]
for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5),
        size:Math.random()*2
    })
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height)

    particles.forEach(p=>{
        p.x+=p.vx
        p.y+=p.vy

        if(p.x<0||p.x>canvas.width)p.vx*=-1
        if(p.y<0||p.y>canvas.height)p.vy*=-1

        ctx.beginPath()
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
        ctx.fillStyle="#00ffff"
        ctx.fill()
    })

    requestAnimationFrame(animate)
}
animate()

// ================= CURSOR =================
const cursor=document.createElement("div")
cursor.className="cursor"
document.body.appendChild(cursor)

document.addEventListener("mousemove",(e)=>{
    cursor.style.left=e.clientX+"px"
    cursor.style.top=e.clientY+"px"
})
</script>

</body>
</html>
